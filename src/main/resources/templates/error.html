<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary: #1a1a2e; --accent: #e94560; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .error-box { max-width: 500px; padding: 20px; }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 60px rgba(233,69,96,0.4);
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 12px; }
        p { color: rgba(255,255,255,0.6); margin-bottom: 32px; }
        .btn-home {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 32px;
            font-size: 1rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-home:hover { background: #c73652; color: white; }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-code" th:text="${status ?: '¡Ups!'}">Error</div>
        <h2 th:text="${error ?: 'Algo salió mal'}">Error inesperado</h2>
        <p th:text="${message ?: 'La página que buscas no existe o ha ocurrido un error inesperado.'}">
            Por favor, vuelve al inicio.
        </p>
        <a href="/inicio" class="btn-home">🏠 Volver al Inicio</a>
    </div>
</body>
</html>
