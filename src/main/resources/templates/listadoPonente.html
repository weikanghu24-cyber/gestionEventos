<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Listado de Ponentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary: #1a1a2e; --accent: #e94560; --gold: #f5a623; --light-bg: #f8f5f0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--light-bg); }
        .top-bar { background: linear-gradient(135deg, var(--primary), #0f3460); padding: 20px 0; color: white; }
        .top-bar h2 { font-family: 'Playfair Display', serif; margin: 0; }
        .btn-back { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 16px; text-decoration: none; font-size: 0.9rem; }
        .btn-back:hover { background: rgba(255,255,255,0.25); color: white; }
        .table-container { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); overflow: hidden; }
        .table thead { background: #0f3460; color: white; }
        .table thead th { font-weight: 500; padding: 14px 20px; border: none; }
        .table tbody td { padding: 14px 20px; vertical-align: middle; }
        .table tbody tr:hover { background: rgba(15,52,96,0.04); }
        .badge-empresa { background: rgba(15,52,96,0.1); color: #0f3460; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--gold)); display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.9rem; }
        .btn-alta { background: #0f3460; color: white; border: none; border-radius: 8px; padding: 8px 20px; text-decoration: none; }
        .btn-alta:hover { background: #1a4a80; color: white; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container d-flex justify-content-between align-items-center">
            <h2>🎙️ Listado de Ponentes</h2>
            <a href="/inicio" class="btn-back">← Inicio</a>
        </div>
    </div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <p class="text-muted mb-0" th:text="'Total: ' + ${#lists.size(ponentes)} + ' ponentes registrados'"></p>
            <a href="/altaPonente" class="btn-alta">+ Nuevo Ponente</a>
        </div>

        <div class="table-container">
            <div th:if="${#lists.isEmpty(ponentes)}" style="text-align:center; padding: 60px; color:#aaa;">
                <div style="font-size: 3rem;">👤</div>
                <p>No hay ponentes registrados aún.</p>
                <a href="/altaPonente" class="btn-alta">Añadir primer ponente</a>
            </div>

            <table class="table table-hover mb-0" th:if="${!#lists.isEmpty(ponentes)}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ponente</th>
                        <th>Empresa</th>
                        <th>Tema de la Charla</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ponente : ${ponentes}">
                        <td style="color:#aaa;" th:text="${ponente.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="avatar" th:text="${#strings.substring(ponente.nombre,0,1)}"></div>
                                <div>
                                    <div style="font-weight:500;" th:text="${ponente.nombre} + ' ' + ${ponente.apellidos}"></div>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge-empresa" th:text="${ponente.empresa}"></span></td>
                        <td th:text="${ponente.temaCharla}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
