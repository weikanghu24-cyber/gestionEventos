<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alta de Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary: #1a1a2e; --accent: #e94560; --light-bg: #f8f5f0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--light-bg); min-height: 100vh; }
        .top-bar { background: linear-gradient(135deg, var(--primary), #0f3460); padding: 20px 0; color: white; }
        .top-bar h2 { font-family: 'Playfair Display', serif; margin: 0; }
        .btn-back { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 16px; text-decoration: none; font-size: 0.9rem; }
        .btn-back:hover { background: rgba(255,255,255,0.25); color: white; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); padding: 40px; max-width: 600px; margin: 40px auto; }
        .form-label { font-weight: 500; color: var(--primary); margin-bottom: 6px; }
        .form-control { border-radius: 10px; border: 1.5px solid #e0e0e0; padding: 12px 16px; transition: border-color 0.2s; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(233,69,96,0.1); }
        .btn-submit { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 500; width: 100%; transition: background 0.2s; }
        .btn-submit:hover { background: #c73652; }
        .form-title { font-family: 'Playfair Display', serif; color: var(--primary); font-size: 1.6rem; margin-bottom: 8px; }
        .divider { width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin-bottom: 28px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container d-flex justify-content-between align-items-center">
            <h2>➕ Alta de Evento</h2>
            <a href="/listadoEvento" class="btn-back">← Listado</a>
        </div>
    </div>

    <div class="container">
        <div class="form-card">
            <h3 class="form-title">Nuevo Evento</h3>
            <div class="divider"></div>

            <form th:action="@{/altaEvento}" th:object="${evento}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre del Evento *</label>
                    <input type="text" class="form-control" th:field="*{nombreEvento}" placeholder="Ej: JavaDay Madrid 2025" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Fecha *</label>
                    <input type="date" class="form-control" th:field="*{fecha}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Lugar *</label>
                    <input type="text" class="form-control" th:field="*{lugar}" placeholder="Ej: Palacio de Congresos, Madrid" required/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Aforo (nº de plazas) *</label>
                    <input type="number" class="form-control" th:field="*{aforo}" min="1" placeholder="Ej: 500" required/>
                </div>
                <button type="submit" class="btn-submit">✅ Guardar Evento</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
